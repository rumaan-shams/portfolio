<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY IMPORTANT for ranking) -->
    <title>
      Rumaan | Role Play Developer Portfolio
    </title>

    <!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/rumaan.ico?v=3" />
<link rel="shortcut icon" href="/rumaan.ico?v=3" />
    <!-- SEO Meta -->
    <meta
      name="description"
      content="I am Rumaan, a full stack developer building modern web interfaces, RAGE:MP systems, and polished digital products."
    />
    <meta
      name="keywords"
      content="Rumaan, full stack developer, RAGE:MP developer, portfolio, React developer, backend developer"
    />
    <meta name="author" content="Rumaan" />

    <!-- Google SEO -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rumaan.in/" />

    <!-- Open Graph (Facebook, Discord, etc.) -->
    <meta property="og:title" content="Rumaan | Developer Portfolio" />
    <meta
      property="og:description"
      content="Full stack developer focused on modern interfaces, backend systems, and premium digital presentation."
    />
    <meta property="og:image" content="/rumaan.ico" />
    <meta property="og:url" content="https://rumaan.in/" />
    <meta property="og:type" content="website" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rumaan Portfolio" />
    <meta
      name="twitter:description"
      content="Full stack developer and RAGE:MP systems builder"
    />
    <meta name="twitter:image" content="/rumaan.ico" />

    <!-- Theme color (mobile browser color) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Schema (VERY IMPORTANT for Google ranking) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Rumaan",
        "url": "https://rumaan.in/",
        "image": "/rumaan.ico",
        "jobTitle": "Role Play Developer",
        "description": "Full stack developer building modern web experiences and RAGE:MP systems.",
        "sameAs": [
         "https://instagram.com/rumaanshams",
"https://discord.com/users/evilghostt_9",
"https://github.com/rumaan-shams"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
